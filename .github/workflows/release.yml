name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install relay deps
        working-directory: relay
        run: npm install

      - name: build AppImage
        working-directory: relay
        run: npm run build:linux

      - name: upload AppImage
        uses: softprops/action-gh-release@v2
        with:
          files: relay/dist/*.AppImage

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install relay deps
        working-directory: relay
        run: npm install

      - name: build EXE
        working-directory: relay
        run: npm run build:win

      - name: upload EXE
        uses: softprops/action-gh-release@v2
        with:
          files: relay/dist/*.exe
